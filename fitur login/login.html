<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BOMA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        
        <div class="left-column">
            <div class="left-overlay">
                <div class="logo-group">
                    <h1 class="main-logo">BOMA</h1>
                    <h2 class="sub-logo">BADAN OLAHRAGA MAHASISWA</h2>
                    <p class="logo-description">BADAN OLAHRAGA MAHASISWA</p>
                </div>
            </div>
        </div>

        <div class="right-column">
            <div class="form-wrapper">
                <h3 class="login-header">LOGIN</h3>
                <div class="header-divider"></div>
                <a href="#" class="create-account-link">Create an Account</a>

                <form>
                    <div class="input-group">
                        <label for="email" class="input-label">Email Address</label>
                        <div class="input-field">
                            <span class="icon">&#9993;</span> 
                            <input type="email" id="email" placeholder="Enter your Email" class="form-input">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password" class="input-label">Password</label>
                        <div class="input-field">
                            <span class="icon">&#128274;</span>
                            <input type="password" id="password" placeholder="Enter your Password" class="form-input">
                            <span class="toggle-password">&#128065;</span>
                        </div>
                    </div>

                    <div class="remember-forgot-row">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" class="checkbox-input">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="sign-in-button">SIGN IN</button>
                </form>
            </div>
        </div>

    </div>

</body>
</html>
