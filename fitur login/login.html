<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BOMA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-body-new">

    <div class="login-split-wrapper">
        
        <div class="login-split-left" style="background-image: url('../public/login-bg.jpg');">
            <div class="login-dark-overlay">
                <img src="../public/logo-boma-white.png" alt="Logo BOMA" class="login-center-logo">
            </div>
        </div>

        <div class="login-split-right">
            <div class="login-form-box">
                
                <div class="login-toggle-pill">
                    <button class="toggle-pill-btn active">Login</button>
                    <button class="toggle-pill-btn">Register</button>
                </div>

                <form action="#">
                    <div class="login-input-group">
                        <label>Email</label>
                        <div class="login-input-line">
                            <span class="icon">✉️</span>
                            <input type="email" placeholder="Enter your email address" required>
                        </div>
                    </div>

                    <div class="login-input-group">
                        <label>Password</label>
                        <div class="login-input-line">
                            <span class="icon">🔒</span>
                            <input type="password" placeholder="Enter your Password" required>
                            <span class="icon">👁️</span>
                        </div>
                    </div>

                    <div class="login-options-row">
                        <label class="login-remember">
                            <input type="checkbox"> 
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="login-forgot">Forgot Password ?</a>
                    </div>

                    <button type="submit" class="login-btn-submit">Login</button>
                </form>

                <div class="login-social-area">
                    <p>or continue with</p>
                    <div class="login-social-icons">
                        <a href="#" class="soc-icon" style="color: #1877F2; background: white;">f</a> 
                        <a href="#" class="soc-icon" style="color: white;">🍎</a> 
                        <a href="#" class="soc-icon" style="background: white;">G</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
<script>
    const modal = document.getElementById('modalKegiatan');
    const dateCells = document.querySelectorAll('.date-cell');

    // Munculin modal pas tanggal diklik
    dateCells.forEach(cell => {
        cell.onclick = function() {
            modal.style.display = 'flex';
        }
    });

    // Tutup modal
    function closeModal() {
        modal.style.display = 'none';
    }

    // Tutup modal kalau klik di luar area kotak putih
    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</html>
